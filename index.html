<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Yti's Dashboard</title>
</head>
<body>
    <video loop muted id="bg">
        <source src="video/anime/YOUR NAME.mp4" type="video/mp4">
    </video>

    <div id="player">
        <!-- OVERLAY -->
        <div id="overlay">
            <div id="track">Nom du son</div>
            <div id="artist">Artiste</div>
            <div id="label">🔊</div>
            <input type="range" id="volume" min="0" max="1" step="0.01">
        </div>
    </div>

    <audio id="audio" src="music/Phonk for study Atmospheric Mix - DeadNSD.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
